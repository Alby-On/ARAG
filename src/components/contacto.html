<section id="contacto">
    <div class="section-title reveal">
        <h2>Hablemos de tu Proyecto</h2>
    </div>
    
    <div class="contact-container reveal">
        <div class="contact-info">
            <div class="contact-logo">
                <img src="public/images/logos/aragspa-logo.png" alt="Logo ARAG SPA Ingeniería">
            </div>
            
            <h3>Contacto Corporativo</h3>
            
            <div class="ceo-contact" style="margin-bottom: 20px; border-left: 3px solid var(--accent); padding-left: 15px;">
                <p style="margin: 0; font-weight: bold; color: var(--accent);">Álvaro Álvarez</p>
                <p style="margin: 0; font-size: 0.85rem; opacity: 0.8;">CEO & Director de Proyectos</p>
                <p style="margin: 5px 0 0 0;"><i class="fas fa-envelope"></i> alvaro.alvarez@aragspa.cl</p>
            </div>

            <div class="general-data">
                <p><i class="fas fa-map-marker-alt"></i> 5 de Abril N° 115, Chillán, Región de Ñuble</p>
                <p><i class="fas fa-envelope"></i> contacto@aragspa.cl</p>
                <p><i class="fas fa-phone-alt"></i> +56 9 1234 5678</p>
                <p><i class="fas fa-clock"></i> Lunes a Viernes: 09:00 - 18:30</p>
            </div>

            <div class="map-container">
                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3203.245641215112!2d-72.1051513!3d-36.6083333!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x9668d7dd6439097f%3A0x6334f40445d8b76e!2s5%20de%20Abril%20115%2C%20Chill%C3%A1n%2C%20%C3%91uble!5e0!3m2!1ses-419!2scl!4v1710000000000!5m2!1ses-419!2scl" 
                    width="100%" 
                    height="100%" 
                    style="border:0;" 
                    allowfullscreen="" 
                    loading="lazy" 
                    referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>
        </div>

        <form id="formContacto" method="POST">
            <input type="hidden" name="access_key" value="7af1807d-02f2-4797-a4db-27b5e3c61c1e">
            <input type="hidden" name="subject" value="Nueva Solicitud de Contacto - ARAG SpA">
            <input type="hidden" name="from_name" value="Web ARAG SPA">

            <div class="form-group">
                <input type="text" name="nombre" placeholder="Nombre completo" required minlength="3">
            </div>
            
            <div class="form-group">
                <input type="email" name="email" placeholder="Correo electrónico" required>
            </div>

            <div class="form-group">
                <input type="tel" name="telefono" placeholder="Teléfono (9XXXXXXXX)" 
                       pattern="[0-9]{9}" 
                       title="Ingresa los 9 dígitos de tu móvil (ej: 912345678)" 
                       required>
            </div>

            <div class="form-group">
                <select name="servicio" required style="width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #ddd; background: white; color: #666; font-family: inherit;">
                    <option value="" disabled selected>Selecciona el servicio de interés</option>
                    <option value="Ingeniería Eléctrica">Ingeniería Eléctrica</option>
                    <option value="Energía Solar (Fotovoltaico)">Energía Solar (Fotovoltaico)</option>
                    <option value="Mantenimiento Industrial">Mantenimiento Industrial</option>
                    <option value="Proyectos Especiales">Proyectos Especiales</option>
                </select>
            </div>

            <div class="form-group">
                <textarea name="mensaje" rows="4" placeholder="Cuéntanos sobre tu requerimiento o proyecto..." required minlength="10"></textarea>
            </div>
            
            <button type="submit" class="btn">Enviar Solicitud</button>
        </form>

        <div id="toast-success" style="display: none; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 15px 30px; border-radius: 50px; z-index: 9999; box-shadow: 0 10px 25px rgba(29, 132, 207, 0.4); font-weight: bold;">
            ¡Solicitud enviada con éxito! Nos contactaremos pronto.
        </div>
    </div>
</section>
